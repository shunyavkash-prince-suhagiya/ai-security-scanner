version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: scanner_service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://scanner:scanner@postgres:5432/scanner
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET: change-me
      UPLOAD_DIR: /tmp/security-scanner/uploads
      REPORTS_DIR: /tmp/security-scanner/reports
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scanner
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
